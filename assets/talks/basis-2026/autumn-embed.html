<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Autumn live demo</title>
<style>
  html, body {
    margin: 0; padding: 0;
    height: 100%;
    background: transparent;
    font-family: "IBM Plex Sans", -apple-system, BlinkMacSystemFont, Helvetica, Arial, sans-serif;
    color: #1f2330;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 28px;
    padding: 16px;
    box-sizing: border-box;
  }
  #autumn-inline-wrapper {
    width: 62vh;
    max-width: 60vw;
    aspect-ratio: 1;
    position: relative;
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 12px 36px rgba(0,0,0,0.16);
  }
  #autumn-canvas {
    width: 100%;
    height: 100%;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    cursor: pointer;
    display: block;
  }
  /* Compact mode (?compact=1): stack canvas over a slim control row, hide the
     program picker + FPS slider. Used when the embed sits beside code on a slide. */
  body.compact { flex-direction: column; justify-content: flex-start; gap: 0; padding: 0; }
  body.compact #autumn-inline-wrapper { width: min(96vw, 94vh); max-width: 96vw; }
  /* Slide embeds: canvas only, pinned to the top so the grid lines up with the code block. */
  body.compact .autumn-console { display: none; }
</style>
</head>
<body>

<div id="autumn-inline-wrapper">
  <canvas id="autumn-canvas"></canvas>
</div>

<div class="autumn-console">
  {% include autumn_dpad.html id="autumn-dpad" %}
  <div class="autumn-aux">
    <select id="autumn-program-select" class="autumn-aux-select" aria-label="Program"></select>
    <div class="autumn-aux-row">
      <button id="autumn-reset" class="autumn-aux-btn" type="button">Reset</button>
      <button id="autumn-pause" class="autumn-aux-btn" type="button">Pause</button>
    </div>
    <div class="autumn-aux-row" id="autumn-fps-row" style="display: flex; align-items: center; gap: 0.5em; margin-top: 0.35em;">
      <label for="autumn-fps" style="font-family: 'IBM Plex Mono', monospace; font-size: 0.78em; color: #4a4f5a; letter-spacing: 0.05em; text-transform: uppercase;">FPS</label>
      <input id="autumn-fps" type="range" min="1" max="120" step="1" value="8" style="flex: 1; accent-color: #1E3A8A;">
      <span id="autumn-fps-readout" style="font-family: 'IBM Plex Mono', monospace; font-size: 0.85em; color: #1f2330; min-width: 2.6em; text-align: right;">8</span>
    </div>
  </div>
</div>

<script type="module">
{% include autumn_stdlib.js %}
{% include autumn_programs.js %}
{% include autumn_renderer.js %}

const canvas = document.getElementById('autumn-canvas');
const ctx = canvas.getContext('2d');
const select = document.getElementById('autumn-program-select');
const btnReset = document.getElementById('autumn-reset');
const btnPause = document.getElementById('autumn-pause');
const fpsSlider = document.getElementById('autumn-fps');
const fpsReadout = document.getElementById('autumn-fps-readout');

let interpreter = null;
let wasmModule = null;
let gridSize = 16;
let fps = 8;
let paused = false;
let animFrameId = null;
let lastStepTime = 0;
let canvasSize = 480;

function resizeCanvas() {
  const wrapper = document.getElementById('autumn-inline-wrapper');
  const w = wrapper.clientWidth;
  const dpr = window.devicePixelRatio || 1;
  canvasSize = w * dpr;
  canvas.width = canvasSize;
  canvas.height = canvasSize;
  canvas.style.width = w + 'px';
  canvas.style.height = w + 'px';
  if (interpreter) {
    try { gridSize = renderGrid(ctx, interpreter.renderAll(), canvasSize); } catch(e) {}
  }
}

for (const name of Object.keys(PROGRAMS)) {
  const opt = document.createElement('option');
  opt.value = name;
  opt.textContent = name;
  select.appendChild(opt);
}

// Per-embed config via query string: ?program=Sand preselects a game,
// ?compact=1 switches to the stacked, chrome-light layout for slide use.
const embedParams = new URLSearchParams(location.search);
const requestedProgram = embedParams.get('program');
if (requestedProgram && PROGRAMS[requestedProgram]) {
  select.value = requestedProgram;
}
if (embedParams.get('compact') === '1') {
  document.body.classList.add('compact');
}

function loadProgram(name) {
  const code = PROGRAMS[name];
  if (!code || !wasmModule) return;
  if (animFrameId) cancelAnimationFrame(animFrameId);
  try {
    interpreter = new wasmModule.Interpreter();
    interpreter.runScript(code, autumnstdlib, '', BigInt(42));
    fps = interpreter.getFrameRate() || 8;
    if (fpsSlider) {
      fpsSlider.value = Math.max(1, Math.min(120, fps));
      if (fpsReadout) fpsReadout.textContent = String(fps);
    }
    paused = false;
    btnPause.textContent = 'Pause';
    gridSize = renderGrid(ctx, interpreter.renderAll(), canvasSize);
    lastStepTime = performance.now();
    gameLoop(performance.now());
  } catch (e) { console.error(e); }
}

function gameLoop(ts) {
  if (!interpreter) return;
  if (!paused) {
    const interval = 1000 / fps;
    if (ts - lastStepTime >= interval) {
      lastStepTime = ts;
      try {
        interpreter.step();
        gridSize = renderGrid(ctx, interpreter.renderAll(), canvasSize);
      } catch (e) { console.error(e); return; }
    }
  }
  animFrameId = requestAnimationFrame(gameLoop);
}

select.addEventListener('change', () => loadProgram(select.value));
btnReset.addEventListener('click', () => loadProgram(select.value));
btnPause.addEventListener('click', () => {
  paused = !paused;
  btnPause.textContent = paused ? 'Resume' : 'Pause';
});

if (fpsSlider) {
  fpsSlider.addEventListener('input', () => {
    const v = parseInt(fpsSlider.value, 10);
    if (Number.isFinite(v) && v > 0) {
      fps = v;
      if (fpsReadout) fpsReadout.textContent = String(v);
    }
  });
}

function sendDirection(dir) {
  if (!interpreter || typeof interpreter[dir] !== 'function') return;
  try {
    interpreter[dir]();
    interpreter.step();
    gridSize = renderGrid(ctx, interpreter.renderAll(), canvasSize);
  } catch (err) { console.error(err); }
}

document.addEventListener('keydown', (e) => {
  if (!interpreter) return;
  const actions = { ArrowLeft: 'left', ArrowRight: 'right', ArrowUp: 'up', ArrowDown: 'down' };
  if (actions[e.key]) {
    e.preventDefault();
    sendDirection(actions[e.key]);
  }
});

document.querySelectorAll('#autumn-dpad .autumn-dir').forEach((btn) => {
  const dir = btn.dataset.dir;
  btn.addEventListener('pointerdown', (e) => {
    e.preventDefault();
    sendDirection(dir);
  });
});

canvas.addEventListener('click', (e) => {
  if (!interpreter) return;
  const rect = canvas.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;
  const cellSize = canvasSize / gridSize;
  const x = Math.floor((e.clientX - rect.left) * dpr / cellSize);
  const y = Math.floor((e.clientY - rect.top) * dpr / cellSize);
  try {
    interpreter.click(x, y);
    interpreter.step();
    gridSize = renderGrid(ctx, interpreter.renderAll(), canvasSize);
  } catch (err) { console.error(err); }
});

window.addEventListener('resize', resizeCanvas);

async function init() {
  resizeCanvas();
  try {
    const moduleUrl = '/assets/wasm/interpreter_web.js';
    const wasmUrl = '/assets/wasm/interpreter_web.wasm';
    const { default: createInterpreterModule } = await import(moduleUrl);
    wasmModule = await createInterpreterModule({
      locateFile: (path) => path.endsWith('.wasm') ? wasmUrl : path
    });
    loadProgram(select.value);
  } catch (e) {
    console.error('Failed to load Autumn WASM:', e);
  }
}

init();
</script>
</body>
</html>
