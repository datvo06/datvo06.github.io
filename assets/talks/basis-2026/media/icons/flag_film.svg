    <path fill="#2D2D2A" fill-rule="evenodd" d="M6 0h40a6 6 0 0 1 6 6v32a6 6 0 0 1-6 6H6a6 6 0 0 1-6-6V6A6 6 0 0 1 6 0z
    M5 6h5v5H5V6z M42 6h5v5h-5V6z
    M5 17h5v5H5v-5z M42 17h5v5h-5v-5z
    M5 28h5v5H5v-5z M42 28h5v5h-5v-5z"/>
    <!-- film frames (light gray, like exposed celluloid) -->
    <rect x="15" y="10" width="22" height="6" fill="#D6D2C4"/>
    <rect x="15" y="19" width="22" height="6" fill="#D6D2C4"/>
    <rect x="15" y="28" width="22" height="6" fill="#D6D2C4"/>
  </g>
</svg>
