<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="128" height="92" viewBox="0 0 128 92" role="img" aria-label="Cute small flag and film strip icon">
  <!-- flag -->
  <g transform="translate(16 16)">
    <rect x="0" y="0" width="7" height="68" rx="3.5" fill="#1A1A1A"/>
    <path d="M7 12h38c3 0 5 3.5 3.2 6L43 26l5.2 8c1.8 2.5-.2 6-3.2 6H7V12z" fill="#3F5A1F"/>
  </g>

